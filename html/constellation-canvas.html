<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Constellation Canvas</title>
  <style>
    @font-face { font-family:"CutiePatootie"; src:url("../fonts/CutiePatootie-Rgjv.ttf") format("truetype"); }
    @font-face { font-family:"Wildcrazy";     src:url("../fonts/Wildcrazy-WKYO.ttf")     format("truetype"); }

    *{ box-sizing:border-box; margin:0; padding:0; }
    html,body{ width:100%; height:100%; }
    body{
      font-family:"Wildcrazy",sans-serif;
      background:#0c1424;
      overflow:hidden;
    }
    canvas{
      width:100vw; height:100vh; display:block;
      background:radial-gradient(circle at 20% 20%, #1b2a4a, #0b1426 55%, #060b16 100%);
    }
    .back-btn{
      position:fixed; left:20px; bottom:20px; z-index:30;
      border:none; border-radius:999px; padding:10px 20px;
      font-family:"CutiePatootie",cursive; font-size:1rem; cursor:pointer;
      background:rgba(255,255,255,0.9); color:#24314a;
      box-shadow:0 8px 22px rgba(0,0,0,0.35);
      transition:transform 0.2s, box-shadow 0.2s;
    }
    .back-btn:hover{ transform:translateY(-2px); box-shadow:0 12px 26px rgba(0,0,0,0.45); }
  </style>
</head>
<body>
  <canvas id="sky"></canvas>
  <button class="back-btn" onclick="sessionStorage.setItem('cameFromPage','true'); location.href='index.html?v=20260315';">Go Back</button>

  <script>
    const canvas = document.getElementById("sky");
    const ctx = canvas.getContext("2d");

    let w = 0, h = 0, dpr = 1;
    const dots = [];
    const dotCount = 320;
    let mouse = { x: 0.5, y: 0.5 };

    function resize(){
      dpr = Math.min(window.devicePixelRatio || 1, 2);
      w = canvas.width = Math.floor(window.innerWidth * dpr);
      h = canvas.height = Math.floor(window.innerHeight * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      seedDots();
    }

    function seedDots(){
      dots.length = 0;
      for(let i=0;i<dotCount;i++){
        dots.push({
          x: Math.random() * window.innerWidth,
          y: Math.random() * window.innerHeight,
          r: Math.random() * 1.6 + 0.6,
          tw: Math.random() * 0.8,
          layer: Math.floor(Math.random() * 3)
        });
      }
    }

    function draw(){
      ctx.clearRect(0,0,canvas.width,canvas.height);
      ctx.save();

      const g = ctx.createRadialGradient(w/4/dpr, h/4/dpr, 0, w/4/dpr, h/4/dpr, w/2/dpr);
      g.addColorStop(0, "rgba(60,90,140,0.35)");
      g.addColorStop(1, "rgba(10,15,30,0)");
      ctx.fillStyle = g;
      ctx.fillRect(0,0,window.innerWidth,window.innerHeight);

      // draw dots
      for(const d of dots){
        const parallax = (d.layer + 1) * 6;
        const dx = (mouse.x - 0.5) * parallax;
        const dy = (mouse.y - 0.5) * parallax;
        const alpha = 0.35 + Math.sin(Date.now() * 0.002 + d.tw) * 0.35;
        ctx.fillStyle = `rgba(220,235,255,${alpha})`;
        ctx.beginPath();
        ctx.arc(d.x + dx, d.y + dy, d.r, 0, Math.PI * 2);
        ctx.fill();
      }

      // connect dots near cursor
      const mx = mouse.x * window.innerWidth;
      const my = mouse.y * window.innerHeight;
      const near = [];
      for(const d of dots){
        const dx = d.x - mx;
        const dy = d.y - my;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if(dist < 160) near.push({ d, dist });
      }
      near.sort((a,b)=>a.dist-b.dist);

      // connect cursor to nearest dots
      const picked = near.slice(0, 8);
      picked.forEach((n,i) => {
        const op = 1 - n.dist / 160;
        ctx.strokeStyle = `rgba(180,210,255,${op * 0.6})`;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(mx, my);
        ctx.lineTo(n.d.x, n.d.y);
        ctx.stroke();
      });

      // connect nearby dots among themselves for a net effect
      for(let i=0;i<picked.length;i++){
        for(let j=i+1;j<picked.length;j++){
          const a = picked[i].d;
          const b = picked[j].d;
          const dx = a.x - b.x;
          const dy = a.y - b.y;
          const dist = Math.sqrt(dx*dx + dy*dy);
          if(dist < 110){
            const op = 1 - dist / 110;
            ctx.strokeStyle = `rgba(140,190,255,${op * 0.35})`;
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(a.x, a.y);
            ctx.lineTo(b.x, b.y);
            ctx.stroke();
          }
        }
      }

      ctx.restore();
      requestAnimationFrame(draw);
    }

    window.addEventListener("mousemove", (e) => {
      mouse.x = e.clientX / window.innerWidth;
      mouse.y = e.clientY / window.innerHeight;
    });

    window.addEventListener("resize", () => resize());

    resize();
    draw();
  </script>
</body>
</html>
