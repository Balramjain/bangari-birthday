<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Fireworks</title>
  <style>
    @font-face {
      font-family: "CutiePatootie";
      src: url("../fonts/CutiePatootie-Rgjv.ttf") format("truetype");
      font-display: swap;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      width: 100%;
      background: #000;
      overflow: hidden;
    }

    .video-wrap {
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 0;
    }

    .video-wrap video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .center-text {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      z-index: 5;
      pointer-events: none;
      text-align: center;
      font-family: "CutiePatootie", cursive;
      font-size: clamp(1.8rem, 4vw, 3.2rem);
      color: #e8f4ff;
      text-shadow:
        0 2px 14px rgba(0, 110, 255, 0.35),
        0 0 28px rgba(120, 190, 255, 0.25);
    }

    .center-text span {
      background: linear-gradient(90deg, #ffffff, #bfe1ff, #7fb6ff, #ffffff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      display: inline-block;
      letter-spacing: 0.02em;
    }

    .back-btn {
      position: fixed;
      left: 20px;
      bottom: 20px;
      z-index: 5;
      border: none;
      border-radius: 999px;
      padding: 10px 18px;
      font-family: "CutiePatootie", cursive;
      font-size: 1.1rem;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.86);
      color: #000;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.2);
      transition: transform 220ms ease, box-shadow 220ms ease;
    }

    .back-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 26px rgba(0, 0, 0, 0.25);
    }
  </style>
</head>
<body>
  <div class="center-text"><span>Celebrating your existence 💙</span></div>
  <button class="back-btn" onclick="sessionStorage.setItem('cameFromPage','true'); location.href='index.html?v=20260315';">
    Go Back
  </button>

  <div class="video-wrap">
    <video autoplay muted playsinline loop>
      <source src="../fireworks2.mp4" type="video/mp4" />
    </video>
  </div>
</body>
</html>
