<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Fireworks</title>
  <style>
    @font-face {
      font-family: "CutiePatootie";
      src: url("../fonts/CutiePatootie-Rgjv.ttf") format("truetype");
      font-display: swap;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      width: 100%;
      background: #000;
      overflow: hidden;
    }

    .video-wrap {
      position: fixed;
      inset: 0;
      background: #000;
    }

    .video-wrap video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .popup {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 5;
      background: rgba(255, 255, 255, 0.88);
      color: #1d1d1d;
      font-family: "CutiePatootie", cursive;
      font-size: clamp(1.1rem, 2.6vw, 1.6rem);
      padding: 10px 18px;
      border-radius: 999px;
      box-shadow: 0 12px 26px rgba(0, 0, 0, 0.25);
    }

    .back-btn {
      position: fixed;
      left: 20px;
      bottom: 20px;
      z-index: 5;
      border: none;
      border-radius: 999px;
      padding: 10px 18px;
      font-family: "CutiePatootie", cursive;
      font-size: 1.1rem;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.86);
      color: #000;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.2);
      transition: transform 220ms ease, box-shadow 220ms ease;
    }

    .back-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 26px rgba(0, 0, 0, 0.25);
    }
  </style>
</head>
<body>
  <div class="popup">Celebrating you ❤</div>
  <button class="back-btn" onclick="sessionStorage.setItem('cameFromPage','true'); location.href='index.html?v=20260315';">
    Go Back
  </button>

  <div class="video-wrap">
    <video autoplay muted playsinline loop>
      <source src="../fireworks2.mp4" type="video/mp4" />
    </video>
  </div>
</body>
</html>
