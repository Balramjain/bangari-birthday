<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Love Message</title>
  <style>
    @font-face {
      font-family: "Heart";
      src: url("../fonts/TheHeartOfEverythingDemo-KRdD.ttf") format("truetype");
      font-display: swap;
    }

    :root {
      --lav1: #c4cfce;
      --lav2: #8ab7b3;
      --lav3: #1a998f;
      --blue1: #187f87;
      --blue2: #155665;
      --ink: #102e3c;
      --shade-1: #c4cfce;
      --shade-2: #1a998f;
      --shade-3: #187f87;
      --shade-4: #155665;
      --shade-5: #102e3c;
      --msg-light: #3b78b2;
      --msg-mid: #1f5f98;
      --msg-dark1: #0f3460;
      --msg-dark2: #000000;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Heart", cursive;
      color: var(--ink);
      background: linear-gradient(to bottom, var(--lav1), var(--lav2), var(--lav3), var(--blue1), var(--blue2));
      background-size: 220% 220%;
      animation: bg-flow 16s ease-in-out infinite;
      overflow-x: hidden;
      padding: 24px 14px 40px;
      --scroll-progress: 0;
      position: relative;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: -20vmax;
      pointer-events: none;
      z-index: 0;
      opacity: 0.48;
      mix-blend-mode: screen;
    }

    body::before {
      background:
        radial-gradient(circle at 18% 26%, rgba(26, 153, 143, 0.45) 0%, transparent 52%),
        radial-gradient(circle at 76% 24%, rgba(24, 127, 135, 0.38) 0%, transparent 48%);
      animation: aura-drift 22s ease-in-out infinite;
    }

    body::after {
      background:
        radial-gradient(circle at 82% 78%, rgba(21, 86, 101, 0.42) 0%, transparent 50%),
        radial-gradient(circle at 20% 80%, rgba(16, 46, 60, 0.28) 0%, transparent 50%);
      animation: aura-drift 28s ease-in-out infinite reverse;
    }

    .hearts { position: fixed; inset: 0; pointer-events: none; z-index: 0; }

    .heart {
      position: absolute;
      opacity: 0;
      animation: float-heart linear infinite;
      filter: drop-shadow(0 2px 6px rgba(255, 255, 255, 0.7));
    }

    .page {
      position: relative;
      z-index: 1;
      width: min(960px, 94vw);
      margin: 0 auto;
      border-radius: 28px;
      background: rgba(237, 245, 244, 0.76);
      border: 1px solid rgba(196, 207, 206, 0.92);
      box-shadow:
        0 24px 64px rgba(16, 46, 60, 0.24),
        0 0 26px rgba(26, 122, 82, 0.16),
        inset 0 1px 0 rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(8px);
      padding: clamp(18px, 4vw, 36px);
    }

    .message { display: grid; gap: 14px; }

    .message h1 {
      margin: 10px 0 clamp(24px, 4vw, 38px);
      font-size: clamp(2.2rem, 7vw, 4.2rem);
      line-height: 1.18;
      padding-bottom: 0.16em;
      text-align: center;
      letter-spacing: 0.01em;
      background: none;
      color: #3b78b2;
      -webkit-text-fill-color: #3b78b2;
      text-shadow: none;
      animation: title-pop 0.8s ease;
    }

    .message p {
      margin: 0;
      font-size: clamp(1.12rem, 3vw, 1.5rem);
      line-height: 1.52;
      color: var(--msg-mid);
      -webkit-text-fill-color: currentColor;
      padding-inline: 0.04em;
      overflow: visible;
      animation: fade-up 0.45s ease both;
    }

    .bottom-nav {
      display: flex;
      justify-content: center;
      margin-top: 18px;
    }

    .back-btn {
      border: none;
      background: #155665;
      color: #eaf3f2;
      border-radius: 999px;
      padding: 10px 16px;
      font-family: inherit;
      font-size: 1rem;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(130, 113, 141, 0.18);
    }

    @keyframes bg-flow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    @keyframes aura-drift {
      0% { transform: translate3d(-2%, -1%, 0) scale(1); }
      50% { transform: translate3d(2%, 2%, 0) scale(1.04); }
      100% { transform: translate3d(-2%, -1%, 0) scale(1); }
    }

    @keyframes float-heart {
      0% { transform: translateY(100vh) scale(0.7); opacity: 0; }
      12% { opacity: 0.7; }
      100% { transform: translateY(-20vh) scale(1.3); opacity: 0; }
    }

    @keyframes fade-up {
      from { transform: translateY(10px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    @keyframes title-pop {
      from { transform: scale(0.95); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    @keyframes text-flow {
      0% { background-position: 0% 50%; filter: saturate(0.98); }
      50% { background-position: 100% 50%; filter: saturate(1.1); }
      100% { background-position: 0% 50%; filter: saturate(0.98); }
    }

    @keyframes title-flow {
      0% { background-position: 50% 0%; }
      50% { background-position: 50% 100%; }
      100% { background-position: 50% 0%; }
    }
  </style>
</head>
<body>
  <div class="hearts" id="hearts"></div>

  <main class="page">
    <section class="message" id="message"></section>

    <div class="bottom-nav">
      <button class="back-btn" onclick="location.href='index.html'">Back To Home</button>
    </div>
  </main>

  <script>
  const hearts = document.getElementById("hearts");
  const messageEl = document.getElementById("message");

  const MESSAGE_DATA = {
    title: "To My Jaanu Kuttu 💖",
    paragraphs: [
      "Happy Birthday, my love. My Bangari. My Bondu. My Pengu. My Babydu. Today is your day, and I just want you to know, from the very bottom of my heart, from the deepest and most real part of me, that I love you.",
      "You came into my life and everything shifted. Like the world quietly rearranged itself to make more sense. Like colors got brighter and every ordinary day started feeling special.",
      "I love you in the quiet moments and in the loud ones, in the silly ones and in the serious ones, in every version of every day we have shared together.",
      "My Bondu, you are genuinely and beautifully kind. You make people feel seen, heard, and valued, and that warmth is one of the most extraordinary things about you.",
      "You are the sweetest person I have ever known. I notice every little thing you do, every way you care, every way you make me feel loved.",
      "You understand me in ways I did not even know I needed. You always make space for all of me, without judgment, with the gentlest heart.",
      "I love your laughter, your eyes when you are excited, and the way you love with your whole heart. I feel lucky every single day.",
      "Happy Birthday, my Bondu. The world is better because you exist. You make it softer, kinder, and more beautiful just by being in it.",
      "On your birthday, I want you to feel how deeply loved you are. Not just in this moment, but always, constantly, and completely.",
      "I see you in every part of my future. Every plan, every dream, every ordinary Wednesday and every extraordinary moment.",
      "You deserve flowers, music, laughter, celebration, and every good thing this life can give.",
      "I love all the versions of you. There is not a version of you that I would not choose.",
      "You are my calm in every chaos, my home in every storm, and my favorite person to share every feeling with.",
      "Thank you for your kindness, your patience, your comfort, your warmth, and your love. Thank you for being mine.",
      "Happy Birthday, my Pengu. My Bondu. My Babydu. My Bangari. My love.",
      "I love you. I love you. I love you.",
      "Today and every day, forever. 💖🐾"
    ]
  };

  function escapeHtml(str) {
    return String(str || "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;");
  }

  function renderMessage(title, paragraphs) {
    const safeTitle = escapeHtml(title || "Birthday Message");
    const safeParagraphs = (paragraphs || []).map((p, i) => {
      const delay = Math.min(i * 0.04, 0.5);
      return "<p data-para-index=\"" + i + "\" style=\"animation-delay:" + delay + "s\">" + escapeHtml(p).replace(/\n/g, "<br>") + "</p>";
    }).join("");
    messageEl.innerHTML = "<h1>" + safeTitle + "</h1>" + safeParagraphs;
  }

  let scrollTicking = false;
  function updateScrollProgress() {
    const maxScroll = document.documentElement.scrollHeight - window.innerHeight;
    const progress = maxScroll > 0 ? Math.min(window.scrollY / maxScroll, 1) : 0;
    document.body.style.setProperty("--scroll-progress", progress.toFixed(3));
    updateMessageShades(progress);
  }

  function hexToRgb(hex) {
    const clean = String(hex).replace("#", "");
    const n = parseInt(clean, 16);
    return {
      r: (n >> 16) & 255,
      g: (n >> 8) & 255,
      b: n & 255
    };
  }

  function lerp(a, b, t) {
    return Math.round(a + (b - a) * t);
  }

  function lerpColor(fromHex, toHex, t) {
    const a = hexToRgb(fromHex);
    const b = hexToRgb(toHex);
    return "rgb(" + lerp(a.r, b.r, t) + ", " + lerp(a.g, b.g, t) + ", " + lerp(a.b, b.b, t) + ")";
  }

  function updateMessageShades(progress) {
    const p = Math.min(Math.max(progress, 0), 1);
    const lightBlue = "#3b78b2";
    const midBlue = "#1f5f98";
    const deepBlue = "#0f3460";
    const black = "#000000";

    // Global palette drift for related UI elements.
    const lightShade = lerpColor(lightBlue, midBlue, p * 0.45);
    const topShade = lerpColor(midBlue, deepBlue, p * 0.75);
    const midShade = lerpColor(deepBlue, black, p * 0.8);
    const bottomShade = lerpColor("#091a24", black, p);

    document.documentElement.style.setProperty("--msg-light", lightShade);
    document.documentElement.style.setProperty("--msg-mid", topShade);
    document.documentElement.style.setProperty("--msg-dark1", midShade);
    document.documentElement.style.setProperty("--msg-dark2", bottomShade);

    // Paragraph-level color so wrapped lines stay the same shade.
    const paraEls = messageEl.querySelectorAll("p[data-para-index]");
    const total = Math.max(paraEls.length - 1, 1);
    paraEls.forEach((el, idx) => {
      const order = idx / total; // top paragraphs stay lighter
      const t = Math.min(1, p * 0.72 + order * 0.4);
      const color = t < 0.55
        ? lerpColor(lightBlue, deepBlue, t / 0.55)
        : lerpColor(deepBlue, black, (t - 0.55) / 0.45);
      el.style.color = color;
    });
  }

  function spawnHearts() {
    const symbols = ["💜", "💙", "✨"];
    for (let i = 0; i < 24; i += 1) {
      const h = document.createElement("span");
      h.className = "heart";
      h.textContent = symbols[i % symbols.length];
      h.style.left = Math.random() * 100 + "vw";
      h.style.fontSize = (Math.random() * 0.9 + 0.8) + "rem";
      h.style.animationDuration = (Math.random() * 7 + 8) + "s";
      h.style.animationDelay = (Math.random() * 8) + "s";
      hearts.appendChild(h);
    }
  }

  function initEffects() {
    window.addEventListener("scroll", () => {
      if (scrollTicking) return;
      scrollTicking = true;
      requestAnimationFrame(() => {
        updateScrollProgress();
        scrollTicking = false;
      });
    }, { passive: true });
    updateScrollProgress();
    spawnHearts();
  }

  renderMessage(MESSAGE_DATA.title, MESSAGE_DATA.paragraphs);
  initEffects();
  </script>
</body>
</html>
