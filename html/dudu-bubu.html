<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Dudu And Bubu Mood Match</title>
  <style>
    @font-face {
      font-family: "CutiePatootie";
      src: url("../fonts/CutiePatootie-Rgjv.ttf") format("truetype");
      font-display: swap;
    }

    @font-face {
      font-family: "LoveBubbles";
      src: url("../fonts/LoveBubbles-MV21J.ttf") format("truetype");
      font-display: swap;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body,
    body * {
      font-family: "LoveBubbles", "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", sans-serif;
    }

    :root {
      --bg-1: #fff4fb;
      --bg-2: #edf7ff;
      --ink: #34263f;
      --soft: #7e6a89;
      --card: rgba(255, 255, 255, 0.9);
      --line: rgba(52, 38, 63, 0.12);
    }

    body {
      min-height: 100svh;
      padding: 24px 16px 96px;
      color: var(--ink);
      font-size: 1.5rem;
      background:
        radial-gradient(circle at top left, rgba(255, 184, 216, 0.32), transparent 28%),
        radial-gradient(circle at top right, rgba(182, 223, 255, 0.28), transparent 30%),
        linear-gradient(145deg, var(--bg-1), var(--bg-2));
    }

    .shell {
      width: min(980px, 100%);
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 20px;
    }

    h1 {
      font-family: "CutiePatootie", cursive;
      font-size: clamp(3.3rem, 7.8vw, 5.2rem);
      line-height: 1.02;
    }

    header p {
      margin-top: 8px;
      color: var(--soft);
      font-size: 1.5rem;
      line-height: 1.6;
    }

    .panel {
      border-radius: 30px;
      border: 1px solid var(--line);
      background: var(--card);
      box-shadow:
        0 24px 50px rgba(66, 50, 92, 0.12),
        inset 0 1px 0 rgba(255, 255, 255, 0.92);
      padding: 30px;
      backdrop-filter: blur(10px);
    }

    .choice-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
    }

    .choice-btn {
      display: block;
      text-decoration: none;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.8);
      border-radius: 28px;
      padding: 30px 24px;
      color: var(--ink);
      background-size: 180% 180%;
      box-shadow:
        0 18px 36px rgba(98, 122, 147, 0.14),
        0 8px 18px rgba(175, 125, 170, 0.1),
        inset 0 1px 0 rgba(255, 255, 255, 0.96);
      transition: transform 0.22s ease, box-shadow 0.22s ease, background-position 0.4s ease;
    }

    .choice-btn:hover {
      transform: translateY(-3px);
      background-position: 100% 100%;
      box-shadow:
        0 24px 46px rgba(98, 122, 147, 0.2),
        0 10px 24px rgba(175, 125, 170, 0.14),
        inset 0 1px 0 rgba(255, 255, 255, 1);
    }

    .choice-btn strong {
      display: block;
      font-size: 2.2rem;
      margin-bottom: 8px;
    }

    .choice-btn span {
      display: block;
      color: var(--soft);
      line-height: 1.55;
      font-size: 1.45rem;
    }

    .choice-btn.dudu {
      background: linear-gradient(150deg, rgba(255, 238, 244, 0.98), rgba(255, 248, 252, 0.98), rgba(248, 233, 244, 0.94));
    }

    .choice-btn.bubu {
      background: linear-gradient(150deg, rgba(233, 245, 255, 0.98), rgba(244, 251, 255, 0.98), rgba(227, 240, 252, 0.94));
    }

    .back-btn {
      position: fixed;
      left: 20px;
      bottom: 20px;
      z-index: 30;
      border: none;
      border-radius: 999px;
      padding: 14px 22px;
      font-family: "CutiePatootie", cursive;
      font-size: 1.55rem;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.9);
      color: var(--ink);
      box-shadow: 0 10px 22px rgba(0, 0, 0, 0.14);
    }

    @media (max-width: 640px) {
      body {
        font-size: 1.2rem;
      }

      header p {
        font-size: 1.22rem;
      }

      .choice-grid {
        grid-template-columns: 1fr;
      }

      .choice-btn strong {
        font-size: 1.9rem;
      }

      .choice-btn span {
        font-size: 1.18rem;
      }
    }
  </style>
</head>
<body>
  <button class="back-btn" onclick="sessionStorage.setItem('cameFromPage','true'); location.href='index.html?v=20260321';">
    Go Back
  </button>

  <main class="shell">
    <header>
      <h1>Dudu And Bubu</h1>
      <p>Choose your baby first, then choose the mood, then get the gif scene.</p>
    </header>

    <section class="panel">
      <div class="choice-grid">
        <a class="choice-btn dudu" href="dudu-mood.html">
          <strong>Dudu</strong>
          <span>Chaotic cute, little dramatic, full pookie energy.</span>
        </a>
        <a class="choice-btn bubu" href="bubu-mood.html">
          <strong>Bubu</strong>
          <span>Soft-soft cutie, clingy baby, full love-loading vibes.</span>
        </a>
      </div>
    </section>
  </main>
</body>
</html>
