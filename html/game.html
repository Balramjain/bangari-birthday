<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Purrcade</title>
  <style>
    @font-face { font-family: "GamePaused"; src: url("../fonts/GamepauseddemoRegular-RpmY6.otf") format("opentype"); font-display: swap; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "GamePaused", system-ui, sans-serif;
      display: grid;
      place-items: center;
      padding: 20px;
      background:
        radial-gradient(circle at 14% 15%, rgba(255, 189, 226, 0.5), transparent 35%),
        radial-gradient(circle at 86% 22%, rgba(169, 210, 255, 0.5), transparent 40%),
        radial-gradient(circle at 72% 86%, rgba(184, 255, 227, 0.44), transparent 38%),
        linear-gradient(140deg, #f7f4ff 0%, #e9f3ff 50%, #e7fff2 100%);
      color: #1f2f4f;
    }
    .panel {
      width: min(920px, 95vw);
      background: rgba(255,255,255,.88);
      border: 1px solid rgba(255,255,255,.95);
      border-radius: 28px;
      padding: clamp(20px,4vw,36px);
      box-shadow: 0 24px 58px rgba(30,42,67,.2);
      text-align: center;
    }
    h1 { margin: 0 0 10px; font-size: clamp(2.4rem, 7vw, 4.2rem); letter-spacing: .04em; }
    p { margin: 0 0 20px; font-size: clamp(.95rem,2.2vw,1.2rem); opacity: .88; }
    .btn {
      border: none;
      border-radius: 16px;
      padding: 16px 18px;
      font-family: inherit;
      font-size: clamp(1.1rem, 2.9vw, 1.8rem);
      cursor: pointer;
      color: #172a4a;
      background: linear-gradient(135deg,#ffcaea,#9fccff 56%,#96f0d7);
      box-shadow: 0 12px 24px rgba(52,88,156,.24);
      width: min(460px, 100%);
    }
    .meta { display:block; margin-top:8px; font-size:.7em; opacity:.85; letter-spacing:.03em; }
    .back {
      margin-top: 12px;
      width: min(460px, 100%);
      border: none;
      border-radius: 16px;
      padding: 14px;
      font-family: inherit;
      font-size: 1.2rem;
      background: linear-gradient(135deg,#2d4f82,#203d65);
      color: #fff;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <main class="panel">
    <h1>Purrcade</h1>

    <button class="btn" onclick="location.href='game-repo-collection.html'">
      PLAY
    </button>

    <button class="back" onclick="sessionStorage.setItem('cameFromPage','true'); location.href='index.html?v=20260308';">Go Back</button>
  </main>
</body>
</html>
