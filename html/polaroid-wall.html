<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Pinned Moments</title>
  <style>
    @font-face {
      font-family: "CutiePatootie";
      src: url("../fonts/CutiePatootie-Rgjv.ttf") format("truetype");
      font-display: swap;
    }

    @font-face {
      font-family: "Wildcrazy";
      src: url("../fonts/Wildcrazy-WKYO.ttf") format("truetype");
      font-display: swap;
    }

    @font-face {
      font-family: "Cookiemonster";
      src: url("../fonts/Cookiemonster-gv11.ttf") format("truetype");
      font-display: swap;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #fff6ea;
      --bg-2: #f0f6ff;
      --card: #ffffffcc;
      --ink: #2a2a3b;
      --accent: #ffd2a8;
      --accent-2: #b9d8ff;
    }

    body {
      font-family: "Wildcrazy", sans-serif;
      color: var(--ink);
      background: linear-gradient(140deg, var(--bg), var(--bg-2));
      min-height: 100vh;
      padding: 24px 16px 80px;
      overflow-x: hidden;
    }

    body > * {
      position: relative;
      z-index: 2;
    }

    .bg-sparkles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }

    .bg-sparkles span {
      position: absolute;
      width: var(--size);
      height: var(--size);
      border-radius: 999px;
      background: var(--accent-2);
      opacity: 0.45;
      filter: blur(0.2px);
      animation: float 10s ease-in-out infinite;
    }

    @keyframes float {
      0% { transform: translateY(0) translateX(0) scale(1); }
      50% { transform: translateY(-16px) translateX(10px) scale(1.06); }
      100% { transform: translateY(0) translateX(0) scale(1); }
    }

    header {
      text-align: center;
      margin: 12px auto 22px;
      max-width: 900px;
    }

    header h1 {
      font-family: "CutiePatootie", cursive;
      font-size: clamp(2.2rem, 6vw, 3.4rem);
    }

    header p {
      margin-top: 8px;
      font-size: 1.1rem;
      opacity: 0.8;
    }
.back-btn {
      position: fixed;
      left: 20px;
      bottom: 20px;
      z-index: 30;
      border: none;
      border-radius: 999px;
      padding: 10px 18px;
      font-family: "CutiePatootie", cursive;
      font-size: 1.1rem;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.86);
      color: #000;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.2);
      transition: transform 220ms ease, box-shadow 220ms ease;
    }

    .back-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 26px rgba(0, 0, 0, 0.25);
    }
    .panel {
      width: min(980px, 92vw);
      margin: 0 auto;
      padding: 28px;
      border-radius: 26px;
      background-image: url("https://images.unsplash.com/photo-1761626677340-dd264ebedfd4?auto=format&fit=crop&fm=jpg&q=80&w=2000");
      background-size: cover;
      background-position: center;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.12);
      min-height: 65vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .panel::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(150deg, rgba(255,255,255,0.92), rgba(255,255,255,0.78));
    }

    .panel > * {
      position: relative;
      z-index: 1;
    }

    .mini-panel {
      padding: 16px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.88);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.12);
    }

    @media (max-width: 700px) {
      .panel {
        min-height: 70vh;
        padding: 22px;
      }
    }
.row {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: center;
    }

    .primary-btn {
      border: none;
      border-radius: 999px;
      padding: 10px 18px;
      font-family: "Cookiemonster", sans-serif;
      font-size: 1.05rem;
      cursor: pointer;
      background: var(--accent);
      color: #2b2b3a;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.12);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .primary-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 26px rgba(0, 0, 0, 0.18);
    }

    .tiny-btn {
      border: none;
      border-radius: 10px;
      padding: 6px 12px;
      font-family: "Cookiemonster", sans-serif;
      cursor: pointer;
      background: var(--accent-2);
      color: #2b2b3a;
    }

    .polaroid-grid{display:grid;gap:14px;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));} .polaroid{background:#fff;border-radius:12px;padding:10px 10px 16px;box-shadow:0 10px 18px rgba(0,0,0,0.12);transform:rotate(var(--rot));} .polaroid .photo{height:110px;border-radius:8px;background:linear-gradient(135deg,#ffe3ef,#e3f2ff);margin-bottom:8px;}
  </style>
</head>
<body>

    <span style="--size: 10px; left: 84%; top: 68%;"></span>
  </div>

  <button class="back-btn" onclick="sessionStorage.setItem('cameFromPage','true'); location.href='index.html?v=20260315';">

  <header>
<div class="badge">Fun</div>
      <div class="badge">Interactive</div>
