<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Fetch Game</title>
  <style>
    @font-face {
      font-family: "CutiePatootie";
      src: url("../fonts/CutiePatootie-Rgjv.ttf") format("truetype");
      font-display: swap;
    }

    @font-face {
      font-family: "Wildcrazy";
      src: url("../fonts/Wildcrazy-WKYO.ttf") format("truetype");
      font-display: swap;
    }

    @font-face {
      font-family: "Cookiemonster";
      src: url("../fonts/Cookiemonster-gv11.ttf") format("truetype");
      font-display: swap;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #fff4e1;
      --bg-2: #eefaf0;
      --ink: #2a2a3b;
      --accent: #ffd39c;
      --accent-2: #b9f0d0;
    }

    body {
      font-family: "Wildcrazy", sans-serif;
      color: var(--ink);
      background: linear-gradient(140deg, var(--bg), var(--bg-2));
      min-height: 100vh;
      padding: 24px 16px 80px;
    }

    .back-btn {
      position: fixed;
      left: 20px;
      bottom: 20px;
      z-index: 30;
      border: none;
      border-radius: 999px;
      padding: 10px 18px;
      font-family: "CutiePatootie", cursive;
      font-size: 1.1rem;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.86);
      color: #000;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.2);
    }

    header {
      text-align: center;
      margin: 12px auto 22px;
      max-width: 900px;
    }

    header h1 {
      font-family: "CutiePatootie", cursive;
      font-size: clamp(2.2rem, 6vw, 3.4rem);
    }

    header p {
      margin-top: 8px;
      font-size: 1.1rem;
      opacity: 0.85;
    }

    .panel {
      width: min(980px, 92vw);
      margin: 0 auto;
      padding: 28px;
      border-radius: 26px;
      background: linear-gradient(150deg, rgba(255,255,255,0.95), rgba(255,255,255,0.85));
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.12);
      min-height: 65vh;
      display: grid;
      gap: 12px;
      align-items: center;
      justify-items: center;
    }

    .score {
      font-family: "Cookiemonster", sans-serif;
      font-size: 1.2rem;
    }

    .field {
      position: relative;
      width: min(700px, 88vw);
      height: min(50vh, 360px);
      border-radius: 18px;
      background: linear-gradient(180deg, #fff6e8, #e9ffef);
      overflow: hidden;
      box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.08);
    }

    .ball {
      position: absolute;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #fff, #ffb66c);
      box-shadow: 0 12px 22px rgba(0, 0, 0, 0.2);
      cursor: pointer;
      transition: transform 0.15s ease;
    }

    .ball:active {
      transform: scale(0.95);
    }
  </style>
</head>
<body>
  <button class="back-btn" onclick="sessionStorage.setItem('cameFromPage','true'); location.href='index.html?v=20260315';">
    Go Back
  </button>

  <header>
    <h1>Fetch Game</h1>
    <p>Tap the ball to score points. It keeps running away.</p>
  </header>

  <section class="panel">
    <div class="score">Score: <span id="score">0</span></div>
    <div class="field" id="field">
      <div class="ball" id="ball"></div>
    </div>
  </section>

  <script>
    const ball = document.getElementById("ball");
    const field = document.getElementById("field");
    const scoreEl = document.getElementById("score");
    let score = 0;

    function moveBall() {
      const maxX = field.clientWidth - ball.clientWidth;
      const maxY = field.clientHeight - ball.clientHeight;
      const x = Math.random() * maxX;
      const y = Math.random() * maxY;
      ball.style.left = x + "px";
      ball.style.top = y + "px";
    }

    ball.addEventListener("click", () => {
      score += 1;
      scoreEl.textContent = score;
      moveBall();
    });

    setInterval(moveBall, 900);
    moveBall();
  </script>
</body>
</html>
