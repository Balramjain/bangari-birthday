<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Minku</title>
  <style>
    @font-face {
      font-family: "StarShield";
      src: url("../fonts/StarShieldV2-9M52K.ttf") format("truetype");
      font-display: swap;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      /* CSS scroll snap on the html level */
      scroll-snap-type: y mandatory;
      overflow-y: scroll;
      height: 100%;
    }

    body {
      height: 100%;
      transition: background-color 400ms ease, color 400ms ease;
    }

    /* each snap section */
    .snap-section {
      height: 100vh;
      scroll-snap-align: start;
      scroll-snap-stop: always;
    }

    .fixed-stage {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      pointer-events: none;
      z-index: 10;
    }

    .wordmark {
      margin: 0;
      font-family: "StarShield", sans-serif;
      font-size: clamp(4rem, 20vw, 14rem);
      letter-spacing: 0.06em;
      line-height: 0.92;
      text-align: center;
      user-select: none;
      transition: color 400ms ease;
    }

    .back-btn {
      position: fixed;
      left: 20px;
      bottom: 20px;
      z-index: 30;
      border: none;
      border-radius: 999px;
      padding: 10px 18px;
      font-family: "StarShield", sans-serif;
      font-size: clamp(0.95rem, 2.5vw, 1.2rem);
      letter-spacing: 0.04em;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.82);
      color: #000;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.2);
      transition: transform 220ms ease, box-shadow 220ms ease;
    }

    .back-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 26px rgba(0, 0, 0, 0.25);
    }

    .customizer {
      position: fixed;
      right: 20px;
      bottom: 20px;
      z-index: 30;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      pointer-events: auto;
    }

    .customizer-btn {
      width: 48px;
      height: 48px;
      border-radius: 999px;
      border: none;
      background: rgba(0, 0, 0, 0.85);
      color: #fff;
      font-family: "StarShield", sans-serif;
      font-size: 1.2rem;
      letter-spacing: 0.04em;
      cursor: pointer;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.28);
      transition: transform 200ms ease, box-shadow 200ms ease;
    }

    .customizer-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 26px rgba(0, 0, 0, 0.34);
    }

    .customizer-input {
      width: min(46vw, 260px);
      height: 42px;
      border-radius: 999px;
      border: 1px solid rgba(0, 0, 0, 0.18);
      padding: 0 16px;
      font-family: "StarShield", sans-serif;
      font-size: 1rem;
      letter-spacing: 0.04em;
      outline: none;
      background: rgba(255, 255, 255, 0.9);
      color: #000;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.15);
      opacity: 0;
      transform: translateX(6px);
      pointer-events: none;
      transition: opacity 180ms ease, transform 180ms ease;
    }

    .customizer.open .customizer-input {
      opacity: 1;
      transform: translateX(0);
      pointer-events: auto;
    }
  </style>
</head>
<body>

  <div class="fixed-stage" aria-hidden="true">
    <h1 class="wordmark" id="wordmark">MINKU LOVES YOU</h1>
  </div>

  <button class="back-btn" onclick="sessionStorage.setItem('cameFromPage','true'); location.href='index.html?v=20260308';">
    Go Back
  </button>

  <div class="customizer" id="customizer">
    <input
      class="customizer-input"
      id="customizerInput"
      type="text"
      autocomplete="off"
      spellcheck="false"
      maxlength="50"
      placeholder="Type your text"
      aria-label="Custom text"
    />
    <button class="customizer-btn" id="customizerBtn" aria-label="Edit text">Aa</button>
  </div>

  <!-- one section per combo -->
  <div class="snap-section" data-combo="0"></div>
  <div class="snap-section" data-combo="1"></div>
  <div class="snap-section" data-combo="2"></div>
  <div class="snap-section" data-combo="3"></div>
  <div class="snap-section" data-combo="4"></div>
  <div class="snap-section" data-combo="5"></div>
  <div class="snap-section" data-combo="6"></div>

  <script>
    const body = document.body;
    const wm   = document.getElementById("wordmark");
    const customizer = document.getElementById("customizer");
    const customizerBtn = document.getElementById("customizerBtn");
    const customizerInput = document.getElementById("customizerInput");
    const storageKey = "neonMeowText";

    // Exact combos in order
    const combos = [
      { bg: "#ffffff", fg: "#000000" }, // 1. white bg, black text
      { bg: "#000000", fg: "#ffffff" }, // 2. black bg, white text
      { bg: "#000000", fg: "#ffdc00" }, // 3. black bg, yellow text
      { bg: "#dc3c78", fg: "#ffffff" }, // 4. pink bg, white text
      { bg: "#f5ebda", fg: "#000000" }, // 5. beige bg, black text
      { bg: "#654321", fg: "#ffffff" }, // 6. aesthetic brown bg, white text
      { bg: "#bae1ff", fg: "#000000" }, // 7. sky blue bg, black text
    ];

    function applyCombo(idx) {
      const c = combos[idx];
      body.style.backgroundColor = c.bg;
      wm.style.color = c.fg;
    }

    // Apply first combo immediately
    applyCombo(0);

    // Customizable text with a persistent default
    const savedText = localStorage.getItem(storageKey);
    const defaultText = savedText && savedText.trim().length ? savedText : wm.textContent.trim();
    wm.textContent = defaultText;
    customizerInput.value = defaultText;

    function updateText(value) {
      const next = value.trim().length ? value : defaultText;
      wm.textContent = next;
      localStorage.setItem(storageKey, value);
    }

    customizerBtn.addEventListener("click", () => {
      customizer.classList.toggle("open");
      if (customizer.classList.contains("open")) {
        customizerInput.focus();
        customizerInput.select();
      }
    });

    customizerInput.addEventListener("input", (e) => updateText(e.target.value));
    customizerInput.addEventListener("blur", () => customizer.classList.remove("open"));

    // IntersectionObserver â€” fires when each section hits the viewport
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.intersectionRatio >= 0.6) {
          const idx = parseInt(entry.target.dataset.combo);
          applyCombo(idx);
        }
      });
    }, { threshold: 0.6 });

    document.querySelectorAll(".snap-section").forEach(el => observer.observe(el));
  </script>
</body>
</html>
