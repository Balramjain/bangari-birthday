<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Mood Painter</title>
  <style>
    @font-face {
      font-family: "CutiePatootie";
      src: url("../fonts/CutiePatootie-Rgjv.ttf") format("truetype");
      font-display: swap;
    }

    @font-face {
      font-family: "Wildcrazy";
      src: url("../fonts/Wildcrazy-WKYO.ttf") format("truetype");
      font-display: swap;
    }

    @font-face {
      font-family: "Cookiemonster";
      src: url("../fonts/Cookiemonster-gv11.ttf") format("truetype");
      font-display: swap;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f1ff;
      --bg-2: #f1fff8;
      --card: #ffffffcc;
      --ink: #2a2a3b;
      --accent: #cbb4ff;
      --accent-2: #b9f0d0;
    }

    body {
      font-family: "Wildcrazy", sans-serif;
      color: var(--ink);
      background: linear-gradient(140deg, var(--bg), var(--bg-2));
      min-height: 100vh;
      padding: 24px 16px 80px;
      overflow-x: hidden;
    }

    body > * {
      position: relative;
      z-index: 2;
    }

    .bg-sparkles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }

    .bg-sparkles span {
      position: absolute;
      width: var(--size);
      height: var(--size);
      border-radius: 999px;
      background: var(--accent-2);
      opacity: 0.45;
      filter: blur(0.2px);
      animation: float 10s ease-in-out infinite;
    }

    @keyframes float {
      0% { transform: translateY(0) translateX(0) scale(1); }
      50% { transform: translateY(-16px) translateX(10px) scale(1.06); }
      100% { transform: translateY(0) translateX(0) scale(1); }
    }

    header {
      text-align: center;
      margin: 12px auto 22px;
      max-width: 900px;
    }

    header h1 {
      font-family: "CutiePatootie", cursive;
      font-size: clamp(2.2rem, 6vw, 3.4rem);
    }

    header p {
      margin-top: 8px;
      font-size: 1.1rem;
      opacity: 0.8;
    }
.back-btn {
      position: fixed;
      left: 20px;
      bottom: 20px;
      z-index: 30;
      border: none;
      border-radius: 999px;
      padding: 10px 18px;
      font-family: "CutiePatootie", cursive;
      font-size: 1.1rem;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.86);
      color: #000;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.2);
      transition: transform 220ms ease, box-shadow 220ms ease;
    }

    .back-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 26px rgba(0, 0, 0, 0.25);
    }
    .panel {
      width: min(980px, 92vw);
      margin: 0 auto;
      padding: 28px;
      border-radius: 26px;
      background-image: url("https://images.unsplash.com/photo-1761798983856-6f67414ea18c?auto=format&fit=crop&fm=jpg&q=80&w=2000");
      background-size: cover;
      background-position: center;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.12);
      min-height: 65vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .panel::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(150deg, rgba(255,255,255,0.92), rgba(255,255,255,0.78));
    }

    .panel > * {
      position: relative;
      z-index: 1;
    }

    .mini-panel {
      padding: 16px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.88);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.12);
    }

    @media (max-width: 700px) {
      .panel {
        min-height: 70vh;
        padding: 22px;
      }
    }
.row {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: center;
    }

    .primary-btn {
      border: none;
      border-radius: 999px;
      padding: 10px 18px;
      font-family: "Cookiemonster", sans-serif;
      font-size: 1.05rem;
      cursor: pointer;
      background: var(--accent);
      color: #2b2b3a;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.12);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .primary-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 26px rgba(0, 0, 0, 0.18);
    }

    .tiny-btn {
      border: none;
      border-radius: 10px;
      padding: 6px 12px;
      font-family: "Cookiemonster", sans-serif;
      cursor: pointer;
      background: var(--accent-2);
      color: #2b2b3a;
    }

    .mood-buttons{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;}
  </style>
</head>
<body>
  <div class="bg-sparkles" aria-hidden="true">
    <span style="--size: 10px; left: 8%; top: 12%;"></span>
    <span style="--size: 16px; left: 18%; top: 24%;"></span>
    <span style="--size: 12px; left: 32%; top: 10%;"></span>
    <span style="--size: 14px; left: 44%; top: 22%;"></span>
    <span style="--size: 9px; left: 56%; top: 14%;"></span>
    <span style="--size: 13px; left: 66%; top: 30%;"></span>
    <span style="--size: 11px; left: 78%; top: 16%;"></span>
    <span style="--size: 15px; left: 88%; top: 28%;"></span>
    <span style="--size: 9px; left: 12%; top: 70%;"></span>
    <span style="--size: 12px; left: 36%; top: 78%;"></span>
    <span style="--size: 14px; left: 64%; top: 74%;"></span>
    <span style="--size: 10px; left: 84%; top: 68%;"></span>
  </div>

  <button class="back-btn" onclick="sessionStorage.setItem('cameFromPage','true'); location.href='index.html?v=20260315';">
    Go Back
  </button>

  <header></div>
    <h1>Mood Painter</h1>
    <p>Pick a mood and let the colors hug the page.</p>
  </header>

  <section class="panel">
    <div class="mood-buttons">
      <button class="tiny-btn mood" data-theme="sunny">Sunny</button>
      <button class="tiny-btn mood" data-theme="soft">Soft</button>
      <button class="tiny-btn mood" data-theme="night">Night</button>
      <button class="tiny-btn mood" data-theme="cotton">Cotton</button>
      <button class="tiny-btn mood" data-theme="peach">Peach</button>
      <button class="tiny-btn mood" data-theme="mint">Mint</button>
      <button class="tiny-btn mood" data-theme="lavender">Lavender</button>
      <button class="tiny-btn mood" data-theme="sky">Sky</button>
      <button class="tiny-btn mood" data-theme="honey">Honey</button>
      <button class="tiny-btn mood" data-theme="rose">Rose</button>
      <button class="tiny-btn mood" data-theme="blush">Blush</button>
      <button class="tiny-btn mood" data-theme="berry">Berry</button>
      <button class="tiny-btn mood" data-theme="cream">Cream</button>
      <button class="tiny-btn mood" data-theme="clover">Clover</button>
      <button class="tiny-btn mood" data-theme="aqua">Aqua</button>
      <button class="tiny-btn mood" data-theme="dream">Dream</button>
      <button class="tiny-btn mood" data-theme="apricot">Apricot</button>
      <button class="tiny-btn mood" data-theme="bubble">Bubble</button>
      <button class="tiny-btn mood" data-theme="glow">Glow</button>
      <button class="tiny-btn mood" data-theme="iris">Iris</button>
      <button class="tiny-btn mood" data-theme="cloud">Cloud</button>
      <button class="tiny-btn mood" data-theme="mellow">Mellow</button>
      <button class="tiny-btn mood" data-theme="dove">Dove</button>
      <button class="tiny-btn mood" data-theme="citrus">Citrus</button>
      <button class="tiny-btn mood" data-theme="lullaby">Lullaby</button>
    </div>
  </section>

  <script>
    const themes = {
      sunny: { bg: "#fff4d6", bg2: "#ffe9f0" },
      soft: { bg: "#f6efff", bg2: "#e8f4ff" },
      night: { bg: "#1a2333", bg2: "#2b2f4a", ink: "#f5f5ff" },
      cotton: { bg: "#ffeef5", bg2: "#e7f3ff" },
      peach: { bg: "#fff1e3", bg2: "#ffe9f3" },
      mint: { bg: "#e9fff7", bg2: "#f3f9ff" },
      lavender: { bg: "#f1e7ff", bg2: "#f8f1ff" },
      sky: { bg: "#e8f4ff", bg2: "#fff2fb" },
      honey: { bg: "#fff3cc", bg2: "#ffe7f2" },
      rose: { bg: "#ffe1ef", bg2: "#f7f1ff" },
      blush: { bg: "#ffe7f5", bg2: "#f0f7ff" },
      berry: { bg: "#f8e5ff", bg2: "#f1f6ff" },
      cream: { bg: "#fff7e7", bg2: "#fff0f6" },
      clover: { bg: "#ecfff0", bg2: "#f6fbff" },
      aqua: { bg: "#e7fffb", bg2: "#f1f6ff" },
      dream: { bg: "#f2edff", bg2: "#f9f2ff" },
      apricot: { bg: "#ffe7d6", bg2: "#fff1f7" },
      bubble: { bg: "#ffe8f1", bg2: "#e9f3ff" },
      glow: { bg: "#fff5e1", bg2: "#f0f7ff" },
      iris: { bg: "#eee6ff", bg2: "#f7f1ff" },
      cloud: { bg: "#f3f8ff", bg2: "#fff1f6" },
      mellow: { bg: "#fff2dc", bg2: "#f4f9ff" },
      dove: { bg: "#f2f4ff", bg2: "#fef1f6" },
      citrus: { bg: "#fff4d8", bg2: "#eaf7ff" },
      lullaby: { bg: "#f7e9ff", bg2: "#eaf7ff" }
    };

    document.querySelectorAll(".mood").forEach(btn => {
      btn.addEventListener("click", () => {
        const t = themes[btn.dataset.theme];
        if (!t) return;
        document.documentElement.style.setProperty("--bg", t.bg);
        document.documentElement.style.setProperty("--bg-2", t.bg2);
        document.body.style.color = t.ink || "#2b2b3a";
      });
    });
  </script>
</body>
</html>
