<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Birthday Surprise</title>
  <style>
    @font-face {
      font-family: "Balonku";
      src: url("../fonts/BalonkuRegular-la1w.otf") format("opentype");
      font-display: swap;
    }

    :root {
      --bg1: #f8ecdf;
      --bg2: #f3e2d4;
      --bg3: #ead9ce;
      --ink: #0f0f0f;
      --maroon: #7a3f46;
      --maroon-dark: #5f2f35;
      --glass: rgba(255, 255, 255, 0.68);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
    }

    body {
      margin: 0;
      overflow: hidden;
      font-family: "Balonku", "Trebuchet MS", sans-serif;
      color: var(--ink);
      background: linear-gradient(135deg, var(--bg1), var(--bg2), var(--bg3));
      background-size: 220% 220%;
      animation: skyShift 14s ease-in-out infinite;
      position: relative;
    }

    .aura,
    .aura::before,
    .aura::after {
      position: absolute;
      inset: -20vh;
      content: "";
      pointer-events: none;
      filter: blur(42px);
      z-index: 0;
      opacity: 0.46;
    }

    .aura {
      background: radial-gradient(circle at 20% 20%, rgba(122, 63, 70, 0.26) 0%, transparent 45%);
      animation: driftA 18s ease-in-out infinite;
    }

    .aura::before {
      background: radial-gradient(circle at 80% 20%, rgba(255, 243, 231, 0.7) 0%, transparent 45%);
      animation: driftB 20s ease-in-out infinite;
    }

    .aura::after {
      background: radial-gradient(circle at 50% 90%, rgba(170, 125, 113, 0.26) 0%, transparent 46%);
      animation: driftC 23s ease-in-out infinite;
    }

    .sparkles {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }

    .spark {
      position: absolute;
      font-size: 1rem;
      opacity: 0;
      animation: twinkle 5s linear infinite;
    }

    .arena {
      position: absolute;
      inset: 0;
      z-index: 2;
    }

    .hud {
      position: absolute;
      inset: 0;
      z-index: 3;
      pointer-events: none;
    }

    .back {
      position: absolute;
      top: clamp(10px, 2vh, 20px);
      left: clamp(10px, 2vw, 22px);
      width: 50px;
      height: 50px;
      display: grid;
      place-items: center;
      pointer-events: auto;
      text-decoration: none;
      color: #fff;
      font-size: 1.35rem;
      line-height: 1;
      background: linear-gradient(135deg, var(--maroon), var(--maroon-dark));
      border: 2px solid rgba(255, 255, 255, 0.84);
      border-radius: 999px;
      box-shadow: 0 12px 24px rgba(95, 47, 53, 0.34);
    }

    .counter {
      position: absolute;
      top: clamp(10px, 2vh, 20px);
      right: clamp(10px, 2vw, 22px);
      padding: 10px 14px;
      border-radius: 12px;
      font-size: clamp(0.84rem, 2vw, 1rem);
      background: var(--glass);
      border: 1px solid rgba(255, 255, 255, 0.9);
      box-shadow: 0 8px 18px rgba(94, 77, 85, 0.16);
    }

    .top {
      position: absolute;
      top: clamp(20px, 6vh, 56px);
      left: 50%;
      transform: translateX(-50%);
      width: min(92vw, 900px);
      text-align: center;
    }

    .badge {
      display: inline-block;
      padding: 8px 14px;
      margin-bottom: 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.82);
      border: 1px solid rgba(122, 63, 70, 0.18);
      font-size: clamp(0.78rem, 1.9vw, 0.98rem);
      letter-spacing: 0.03em;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.1rem, 6.4vw, 4.6rem);
      line-height: 0.95;
      text-shadow: 0 4px 18px rgba(255, 255, 255, 0.74);
    }

    .sub {
      margin: 8px 0 0;
      font-size: clamp(1rem, 2.6vw, 1.45rem);
      opacity: 0.92;
    }

    .message {
      position: absolute;
      left: 50%;
      bottom: clamp(86px, 13vh, 144px);
      transform: translateX(-50%);
      width: min(92vw, 820px);
      padding: 14px 16px;
      border-radius: 18px;
      font-size: clamp(1rem, 2.4vw, 1.3rem);
      line-height: 1.2;
      text-align: center;
      background: var(--glass);
      border: 1px solid rgba(255, 255, 255, 0.9);
      box-shadow: 0 12px 26px rgba(96, 85, 96, 0.15);
      transition: transform 0.22s ease;
    }

    .btn-row {
      position: absolute;
      left: 50%;
      bottom: clamp(18px, 4vh, 30px);
      transform: translateX(-50%);
      width: min(92vw, 460px);
      display: flex;
      justify-content: center;
      gap: 14px;
      z-index: 6;
      pointer-events: none;
    }

    .yes-btn,
    .no-btn {
      pointer-events: auto;
      border: 0;
      border-radius: 999px;
      padding: 14px 24px;
      font-family: inherit;
      font-size: clamp(1rem, 2.6vw, 1.24rem);
      color: #fff;
      cursor: pointer;
      white-space: nowrap;
    }

    .yes-btn {
      background: linear-gradient(135deg, #6f8d57, #587145);
      box-shadow: 0 12px 24px rgba(79, 97, 63, 0.34);
    }

    .no-btn {
      position: absolute;
      left: 56%;
      top: 58%;
      background: linear-gradient(135deg, #8f4a52, #6e383f);
      box-shadow: 0 14px 24px rgba(95, 47, 53, 0.38);
    }

    .floaty {
      position: absolute;
      pointer-events: none;
      font-size: 1.1rem;
      opacity: 0.9;
      animation: floatUp 2.6s ease-out forwards;
      z-index: 5;
    }

    .video-overlay {
      position: fixed;
      inset: 0;
      z-index: 12;
      background: rgba(10, 8, 10, 0.8);
      display: none;
      place-items: center;
      padding: 20px;
    }

    .video-shell {
      width: min(94vw, 980px);
      border-radius: 18px;
      overflow: hidden;
      background: #151515;
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 18px 46px rgba(0, 0, 0, 0.55);
      position: relative;
    }

    .video-shell video {
      width: 100%;
      height: auto;
      display: block;
      background: #000;
    }

    .close-video {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 36px;
      height: 36px;
      border-radius: 999px;
      border: 0;
      font-size: 1.05rem;
      background: rgba(255, 255, 255, 0.92);
      color: #111;
      cursor: pointer;
    }

    @keyframes skyShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    @keyframes driftA {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(4vw, -2vh); }
    }

    @keyframes driftB {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(-3vw, 2vh); }
    }

    @keyframes driftC {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(2vw, 1vh); }
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0; transform: scale(0.8); }
      30%, 70% { opacity: 0.82; transform: scale(1.06); }
    }

    @keyframes floatUp {
      0% { transform: translateY(0) scale(0.72) rotate(-8deg); opacity: 0; }
      25% { opacity: 1; }
      100% { transform: translateY(-80px) scale(1.12) rotate(8deg); opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="aura"></div>
  <div class="sparkles" id="sparkles"></div>

  <div class="arena" id="arena">
    <button id="noBtn" class="no-btn" type="button">No</button>
  </div>

  <div class="hud">
    <a class="back" href="index.html" aria-label="Back" onclick="localStorage.setItem('cameFromPage','true')">&#8592;</a>
    <div class="counter" id="counter">Near misses: 0</div>

    <div class="top">
      <span class="badge">Birthday + Forever Mode</span>
      <h1>Will you be mine,<br />and celebrate every birthday with me?</h1>
      <p class="sub">Choose your answer below.</p>
    </div>

    <div class="message" id="message">
      Happy birthday, my favorite person. I want to celebrate today... and every next year with you.
    </div>

    <div class="btn-row">
      <button id="yesBtn" class="yes-btn" type="button">Yes</button>
    </div>
  </div>

  <div class="video-overlay" id="videoOverlay">
    <div class="video-shell">
      <button class="close-video" id="closeVideo" type="button">X</button>
      <video id="proposalVideo" controls playsinline preload="metadata">
        <source src="../video/proposal.mp4" type="video/mp4" />
      </video>
    </div>
  </div>

  <script>
    const arena = document.getElementById("arena");
    const noBtn = document.getElementById("noBtn");
    const yesBtn = document.getElementById("yesBtn");
    const message = document.getElementById("message");
    const counter = document.getElementById("counter");
    const sparkles = document.getElementById("sparkles");
    const videoOverlay = document.getElementById("videoOverlay");
    const proposalVideo = document.getElementById("proposalVideo");
    const closeVideo = document.getElementById("closeVideo");

    const lines = [
      "No button says: let us skip to yes.",
      "Caught almost. Still blushing, still running.",
      "Birthday plan upgraded: cake + forever.",
      "No is playing hard to get. Very hard.",
      "Imagine us celebrating every year together.",
      "You deserve birthday magic and lifelong love.",
      "No button left the chat.",
      "I am serious about you and the cake."
    ];

    let misses = 0;

    function randomInRange(min, max) {
      return Math.random() * (max - min) + min;
    }

    function moveNoButton() {
      const arenaRect = arena.getBoundingClientRect();
      const btnRect = noBtn.getBoundingClientRect();
      const topBlock = document.querySelector(".top").getBoundingClientRect();
      const msgBlock = message.getBoundingClientRect();
      const yesRect = yesBtn.getBoundingClientRect();
      const margin = 14;

      const maxX = arenaRect.width - btnRect.width - margin;
      const minY = Math.max(margin, (topBlock.bottom - arenaRect.top) + 20);
      const maxYFromMsg = (msgBlock.top - arenaRect.top) - btnRect.height - 24;
      const maxYFromYes = (yesRect.top - arenaRect.top) - btnRect.height - 20;
      const maxY = Math.min(arenaRect.height - btnRect.height - margin, maxYFromMsg, maxYFromYes);

      const x = randomInRange(margin, Math.max(margin, maxX));
      const fallbackY = Math.max(margin, arenaRect.height * 0.54 - btnRect.height / 2);
      const y = maxY > minY ? randomInRange(minY, maxY) : fallbackY;

      noBtn.style.left = x + "px";
      noBtn.style.top = y + "px";
    }

    function pushMessage() {
      message.textContent = lines[misses % lines.length];
      message.style.transform = "translateX(-50%) scale(1.02)";
      setTimeout(() => {
        message.style.transform = "translateX(-50%) scale(1)";
      }, 200);
    }

    function spawnFloaty(x, y) {
      const el = document.createElement("span");
      el.className = "floaty";
      el.textContent = Math.random() > 0.5 ? "🎀" : "✨";
      el.style.left = x + "px";
      el.style.top = y + "px";
      arena.appendChild(el);
      setTimeout(() => el.remove(), 2600);
    }

    function registerMiss(clientX, clientY) {
      misses += 1;
      counter.textContent = "Near misses: " + misses;
      pushMessage();
      const rect = arena.getBoundingClientRect();
      spawnFloaty(clientX - rect.left, clientY - rect.top);
      moveNoButton();
    }

    arena.addEventListener("pointermove", (e) => {
      const btn = noBtn.getBoundingClientRect();
      const dx = e.clientX - (btn.left + btn.width / 2);
      const dy = e.clientY - (btn.top + btn.height / 2);
      if (Math.hypot(dx, dy) < 110) {
        registerMiss(e.clientX, e.clientY);
      }
    });

    noBtn.addEventListener("pointerdown", (e) => {
      e.preventDefault();
      registerMiss(e.clientX, e.clientY);
    });

    noBtn.addEventListener("click", (e) => {
      e.preventDefault();
      moveNoButton();
    });

    yesBtn.addEventListener("click", () => {
      videoOverlay.style.display = "grid";
      proposalVideo.play().catch(() => {});
    });

    closeVideo.addEventListener("click", () => {
      proposalVideo.pause();
      proposalVideo.currentTime = 0;
      videoOverlay.style.display = "none";
    });

    videoOverlay.addEventListener("click", (e) => {
      if (e.target === videoOverlay) {
        proposalVideo.pause();
        videoOverlay.style.display = "none";
      }
    });

    function spawnSparkles() {
      const icons = ["✨", "⭐", "🫧", "💫"];
      for (let i = 0; i < 28; i += 1) {
        const el = document.createElement("span");
        el.className = "spark";
        el.textContent = icons[i % icons.length];
        el.style.left = randomInRange(0, 100) + "vw";
        el.style.top = randomInRange(0, 100) + "vh";
        el.style.animationDelay = randomInRange(0, 5) + "s";
        el.style.animationDuration = randomInRange(3.4, 6.3) + "s";
        sparkles.appendChild(el);
      }
    }

    window.addEventListener("resize", moveNoButton);
    spawnSparkles();
    moveNoButton();
  </script>
</body>
</html>
