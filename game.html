<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cat Platformer 🐱</title>

<style>
  /* PAGE (can be any color/theme you want) */
  body {
    margin: 0;
    overflow: hidden;
    background: #cfefff; /* page background */
    font-family: sans-serif;
  }

  /* GAME ONLY */
  canvas {
    display: block;
    background: #ffffff; /* ✅ ONLY game area is white */
  }

  /* WIN OVERLAY */
  .win-screen {
    position: fixed;
    inset: 0;
    background: rgba(207, 239, 255, 0.95);
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    text-align: center;
    z-index: 10;
  }

  .win-screen h1 {
    font-size: 2.5rem;
    margin-bottom: 20px;
  }

  .win-screen button {
    padding: 12px 24px;
    font-size: 1rem;
    border: none;
    border-radius: 12px;
    background: #8ecbff;
    cursor: pointer;
  }

  .win-screen button:hover {
    background: #6bb6ff;
  }
</style>
</head>
<body>

<canvas id="game"></canvas>

<div class="win-screen" id="winScreen">
  <h1>🐟 NOM NOM!<br>You win 😻</h1>
  <button onclick="location.href='index.html#back=actions'">⬅ Go back</button>
</div>

<script>
/* =====================
   CANVAS
===================== */
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

/* =====================
   IMAGES
===================== */
const catImg = new Image();
catImg.src = "assets/cat.png";

const fishImg = new Image();
fishImg.src = "assets/fish.png";

/* =====================
   GAME SETTINGS
===================== */
const gravity = 0.8;
let cameraX = 0;
let score = 0;
let gameWon = false;

/* =====================
   PLAYER (BIGGER CAT)
===================== */
const player = {
  x: 100,
  y: 200,
  width: 80,
  height: 80,
  dx: 0,
  dy: 0,
  speed: 5,
  jump: 18,
  grounded: false
};

/* =====================
   PLATFORMS
===================== */
const platforms = [
  { x: 0, y: 420, width: 3000, height: 40 },
  { x: 300, y: 340, width: 160, height: 20 },
  { x: 600, y: 280, width: 160, height: 20 },
  { x: 950, y: 320, width: 160, height: 20 },
  { x: 1300, y: 260, width: 160, height: 20 }
];

/* =====================
   FOOD
===================== */
const foods = [
  { x: 330, y: 300, eaten: false },
  { x: 630, y: 240, eaten: false },
  { x: 1330, y: 220, eaten: false }
];

/* =====================
   INPUT
===================== */
const keys = {};
window.addEventListener("keydown", e => keys[e.key] = true);
window.addEventListener("keyup", e => keys[e.key] = false);

/* =====================
   COLLISION
===================== */
function rectsCollide(a, b) {
  return (
    a.x < b.x + b.width &&
    a.x + a.width > b.x &&
    a.y < b.y + b.height &&
    a.y + a.height > b.y
  );
}

/* =====================
   UPDATE
===================== */
function update() {
  if (gameWon) return;

  if (keys["ArrowRight"]) player.dx = player.speed;
  else if (keys["ArrowLeft"]) player.dx = -player.speed;
  else player.dx = 0;

  if (keys["ArrowUp"] && player.grounded) {
    player.dy = -player.jump;
    player.grounded = false;
  }

  player.dy += gravity;
  player.x += player.dx;
  player.y += player.dy;

  player.grounded = false;
  platforms.forEach(p => {
    if (
      player.x < p.x + p.width &&
      player.x + player.width > p.x &&
      player.y + player.height <= p.y + 10 &&
      player.y + player.height + player.dy >= p.y
    ) {
      player.dy = 0;
      player.y = p.y - player.height;
      player.grounded = true;
    }
  });

  cameraX = player.x - 200;

  foods.forEach(f => {
    if (!f.eaten && rectsCollide(player, { ...f, width: 40, height: 40 })) {
      f.eaten = true;
      score++;
      if (score === foods.length) winGame();
    }
  });
}

/* =====================
   DRAW
===================== */
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.save();
  ctx.translate(-cameraX, 0);

  ctx.fillStyle = "#eef5ff";
  platforms.forEach(p => ctx.fillRect(p.x, p.y, p.width, p.height));

  foods.forEach(f => {
    if (!f.eaten) ctx.drawImage(fishImg, f.x, f.y, 40, 40);
  });

  ctx.drawImage(catImg, player.x, player.y, player.width, player.height);

  ctx.restore();

  ctx.fillStyle = "#333";
  ctx.font = "20px sans-serif";
  ctx.fillText(`🍣 ${score} / ${foods.length}`, 20, 30);
}

/* =====================
   WIN
===================== */
function winGame() {
  gameWon = true;
  document.getElementById("winScreen").style.display = "flex";
}

/* =====================
   LOOP
===================== */
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>

</body>
</html>
